name: Build and Publish Docker Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant: [prod, dev]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker tags
        id: meta
        run: |
          VARIANT_SUFFIX=""
          if [ "${{ matrix.variant }}" = "dev" ]; then
            VARIANT_SUFFIX="-dev"
          fi

          IMAGE_NAME=${GITHUB_REPOSITORY,,}

          TAGS=""
          DOCKERFILE="Dockerfile"

          if [ "${{ matrix.variant }}" = "dev" ]; then
            DOCKERFILE="Dockerfile.dev"
          fi

          # If this is a release (tag push)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${{ env.REGISTRY }}/${IMAGE_NAME}:latest${VARIANT_SUFFIX}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${IMAGE_NAME}:v${VERSION}${VARIANT_SUFFIX}"
          # If this is a commit to master
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="${{ env.REGISTRY }}/${IMAGE_NAME}:nightly${VARIANT_SUFFIX}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "dockerfile=${DOCKERFILE}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        if: steps.meta.outputs.tags != ''
        with:
          context: .
          file: ./${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 #v5
        continue-on-error: true
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
          #ignore-versions: '^latest$|^nightly$|^latest-dev$|^nightly-dev$'
